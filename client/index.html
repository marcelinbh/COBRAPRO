<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: usa toda a tela no iPhone X+ (sem barras brancas) -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#22c55e" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Sistema completo de gestão de empréstimos, cobranças e controle financeiro" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA -->
    <link rel="apple-touch-icon" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663380431118/BkqW4WQ4ndZHJQHLtTMfxv/apple-touch-icon_57bd3591.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CobraPro" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="CobraPro" />

    <!-- Windows -->
    <meta name="msapplication-TileColor" content="#111111" />
    <meta name="msapplication-TileImage" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663380431118/BkqW4WQ4ndZHJQHLtTMfxv/icon-192x192_aaed1e1a.png" />

    <!-- Open Graph (compartilhamento) -->
    <meta property="og:title" content="CobraPro" />
    <meta property="og:description" content="Sistema de gestão de cobranças e empréstimos" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663380431118/BkqW4WQ4ndZHJQHLtTMfxv/icon-512x512_9e3b7dff.png" />

    <title>CobraPro - Sistema de Gestão de Cobranças</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <!-- CRÍTICO: Limpar Service Workers antigos ANTES de qualquer coisa -->
    <!-- Resolve splash infinito causado por SW antigo servindo JS desatualizado -->
    <script>
      (function() {
        var APP_VERSION = '4';
        var storedVersion = localStorage.getItem('app_version');
        if (storedVersion !== APP_VERSION) {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(reg) { reg.unregister(); });
            });
          }
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              keys.forEach(function(key) { caches.delete(key); });
            });
          }
          localStorage.setItem('app_version', APP_VERSION);
        }
        // Timeout de segurança: se React não montar em 8s, recarregar
        setTimeout(function() {
          var root = document.getElementById('root');
          if (root && root.innerHTML.trim() === '') {
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                regs.forEach(function(reg) { reg.unregister(); });
                window.location.reload(true);
              });
            } else {
              window.location.reload(true);
            }
          }
        }, 8000);
      })();
    </script>
  </head>

  <body>
    <!-- Splash screen: aparece imediatamente, some quando o React monta -->
    <div id="splash" style="
      position:fixed;inset:0;z-index:9999;
      background:#0A0A0A;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      font-family:Inter,system-ui,sans-serif;
    ">
      <img
        src="https://d2xsxph8kpxj0f.cloudfront.net/310519663380431118/BkqW4WQ4ndZHJQHLtTMfxv/cobrapro-logo_ca1f0d34.webp"
        alt="CobraPro"
        style="height:56px;width:auto;margin-bottom:32px;object-fit:contain;"
      />
      <div style="
        width:40px;height:40px;
        border:3px solid rgba(255,255,255,0.1);
        border-top-color:#22c55e;
        border-radius:50%;
        animation:spin 0.8s linear infinite;
      "></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
